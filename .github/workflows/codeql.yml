name: "CodeQL"

# Static analysis (SAST) for JS/TS: on push + PR to main, plus a weekly sweep.
# NOTE: free for PUBLIC repos. For a PRIVATE repo this needs GitHub Advanced Security;
# without it the run is skipped/fails — make the repo public or remove this workflow.
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "27 3 * * 1" # Mondays 03:27 UTC

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # security-extended adds more security-focused queries than the default suite.
          queries: security-extended

      # JS/TS is interpreted — no build step needed.
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
