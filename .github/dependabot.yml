# Dependabot: weekly dependency + GitHub Actions update PRs.
# Pairs with GitHub's Dependabot *alerts* + *security updates* (enable those in
# Settings → Code security) which open patch PRs for known vulnerabilities.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Bundle routine minor/patch bumps into one PR to cut noise; majors stay separate.
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
